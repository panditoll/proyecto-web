{% extends 'appcanela/base.html' %}
{% block content %}
<div class="container py-5" style="max-width: 450px;">
  <h3 class="mb-4">Nueva contraseña</h3>

  <form method="post">
    {% csrf_token %}
    {% for field in form %}
      <div class="mb-3">
        <label class="form-label">{{ field.label }}</label>
        <input type="password" name="{{ field.html_name }}" class="form-control" required>
        {% if field.errors %}
          <div class="text-danger small">{{ field.errors }}</div>
        {% endif %}
      </div>
    {% endfor %}
    <button type="submit" class="btn btn-dark w-100">Cambiar contraseña</button>
  </form>
</div>
{% endblock %}
