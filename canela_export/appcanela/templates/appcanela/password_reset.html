{% extends 'appcanela/base.html' %}
{% block content %}
<div class="container py-5" style="max-width: 450px;">
  <h3 class="mb-4">Recuperar contraseña</h3>
  <p class="text-muted">Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.</p>

  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Correo electrónico</label>
      <input type="email" name="email" class="form-control" placeholder="tucorreo@email.com" required>
    </div>
    <button type="submit" class="btn btn-dark w-100">Enviar enlace</button>
  </form>

  <div class="mt-3 text-center">
    <a href="{% url 'login' %}">← Volver al inicio de sesión</a>
  </div>
</div>
{% endblock %}
